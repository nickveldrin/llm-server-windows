# This workflow runs linting tests on Python files

name: Lint Python

on:
  pull_request:
  workflow_dispatch:

jobs:
  ruff:
    runs-on: [self-hosted, linux, proxmox]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.9.1
      - name: Lint with Ruff
        run: |
          ruff check .
