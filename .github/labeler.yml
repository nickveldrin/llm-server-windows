# GitHub Labeler configuration for PRs
# https://github.com/actions/labeler

labeler-automation:
  - .github/**/*

linting:
  - "*.py"
  - "**/*.py"

shell:
  - "*.sh"
  - "**/*.sh"

mac:
  - "llm-server-mac"
  - "**/llm-server-mac*"

windows:
  - "llm-server-windows.py"
  - "**/llm-server-windows*"

linux:
  - "llm-server"
  - "**/llm-server"
